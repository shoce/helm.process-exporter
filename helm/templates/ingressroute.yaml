{{ if $.Values.ingressroute.enabled -}}

---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "{{$.Release.Name}}-basicauth"
  namespace: "{{$.Release.Namespace}}"
type: "Opaque"
data:
  users: "{{ htpasswd $.Values.ingressroute.basicauth.user $.Values.ingressroute.basicauth.pass | b64enc }}"

---
apiVersion: "traefik.io/v1alpha1"
kind: "Middleware"
metadata:
  name: "{{$.Release.Name}}-basicauth"
  namespace: "{{$.Release.Namespace}}"
spec:
  basicAuth:
    secret: "{{$.Release.Name}}-basicauth"

---
apiVersion: "traefik.io/v1alpha1"
kind: "IngressRoute"
metadata:
  name: "{{$.Release.Name}}"
  namespace: "{{$.Release.Namespace}}"
spec:
  entryPoints:
    - "websecure"
  routes:
    - kind: "Rule"
      match: "Host(`{{$.Values.ingressroute.host}}`)"
      middlewares:
        - name: "{{$.Release.Name}}-basicauth"
      services:
        - name: "metrics"
          port: {{$.Values.service.port}}

{{ end }}


